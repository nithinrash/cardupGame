<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardUp</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#111;
            font-family:Arial;
        }

        .container{
            display:flex;
            flex-direction:column;
            gap:25px;
        }

        button{
            width:220px;
            height:80px;
            font-size:28px;
            border:none;
            border-radius:18px;
            background:#0a84ff;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        button:active{
            transform:scale(0.97);
        }

    </style>
</head>

<body>

<div class="container">

    <button onclick="openCardUp()">
        OPEN CARDUP
    </button>

    <button onclick="openOption2()">
        OPTION 2
    </button>

</div>

<script>

function openCardUp()
{
    window.location.href = "http://cardup.local:8000/";
}

function openOption2()
{
    window.location.href = "http://192.168.0.210:8000/";
}

</script>

</body>
</html>
