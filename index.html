<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardUp</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#111;
            font-family:Arial;
        }

        button{
            width:220px;
            height:80px;
            font-size:28px;
            border:none;
            border-radius:18px;
            background:#0a84ff;
            color:white;
            font-weight:bold;
        }

        button:active{
            transform:scale(0.97);
        }
    </style>
</head>

<body>

<button onclick="openCardUp()">
    OPEN CARDUP
</button>

<script>
function openCardUp()
{
    window.location.href = "http://cardup.local:8000/";
}
</script>

</body>
</html>
